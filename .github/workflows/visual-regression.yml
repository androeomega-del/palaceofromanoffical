name: Visual Regression

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: Playwright visual snapshots
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install system deps for cached browsers
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Build app
        run: bun run build

      - name: Start preview server
        run: |
          bun run preview --host 127.0.0.1 --port 8080 > preview.log 2>&1 &
          echo $! > preview.pid
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8080 > /dev/null; then
              echo "Preview ready"; exit 0
            fi
            sleep 1
          done
          echo "Preview failed to start"; cat preview.log; exit 1

      - name: Run visual regression tests
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
          CI: "true"
        run: bun run test:visual

      - name: Stop preview server
        if: always()
        run: |
          if [ -f preview.pid ]; then
            kill "$(cat preview.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload snapshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diffs
          path: test-results/
          retention-days: 14
